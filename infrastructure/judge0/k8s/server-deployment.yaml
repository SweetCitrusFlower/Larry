apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Program Files\Git\usr\bin\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: server
  name: server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: server
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Program Files\Git\usr\bin\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: server
    spec:
      containers:
        - image: judge0/judge0:1.13.1
          name: server
          ports:
            - containerPort: 2358
              protocol: TCP
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /judge0.conf
              name: server-cm0
              readOnly: true
              subPath: judge0.conf
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: judge0.conf
                path: judge0.conf
            name: server-cm0
          name: server-cm0
