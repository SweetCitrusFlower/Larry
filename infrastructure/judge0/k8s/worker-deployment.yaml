apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Program Files\Git\usr\bin\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: worker
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: worker
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Program Files\Git\usr\bin\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: worker
    spec:
      containers:
        - args:
            - bash
            - -c
            - echo 'root ALL=(ALL) NOPASSWD:ALL' >> /etc/sudoers && ./scripts/workers
          image: judge0/judge0:1.13.1
          name: worker
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /judge0.conf
              name: worker-cm0
              readOnly: true
              subPath: judge0.conf
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: judge0.conf
                path: judge0.conf
            name: worker-cm0
          name: worker-cm0
