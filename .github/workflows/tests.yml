name: Python Tests

on:
  push:
    branches: [ main, teste_automate, refactor/architekturson ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Optional: if you want to test against a real DB later, 
      # but for now we use SQLite in-memory.
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aicoach
        ports:
          - 5440:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run tests with pytest and coverage
      run: |
        cd backend
        python -m pytest --cov=app tests/ -v
      env:
        DATABASE_URL: sqlite:///:memory
        TESTING: "true"
        LARRY_EVAL_MODE: mock
