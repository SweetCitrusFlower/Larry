version: '3.8'

services:
  db:
    image: postgres:15
    container_name: aicoach-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aicoach
    ports:
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  vectordb:
    image: chromadb/chroma:latest
    container_name: aicoach-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: aicoach-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: aicoach-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: aicoach-backend
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/aicoach
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: "http://localhost,http://localhost:5173"
      JUDGE0_API_URL: "http://host.docker.internal:2358"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: aicoach-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  chromadata:
  ollamadata:
