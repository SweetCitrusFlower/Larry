apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Program Files\Git\usr\bin\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: backend
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: backend
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Program Files\Git\usr\bin\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: backend
    spec:
      containers:
        - env:
            - name: ALLOWED_ORIGINS
              value: http://localhost,http://localhost:5173
            - name: DATABASE_URL
              value: postgresql://user:password@db:5432/aicoach
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /tmp/adc.json
            - name: GOOGLE_CLOUD_PROJECT
              value: project-43919676-77f2-42ed-8b8
            - name: JUDGE0_API_URL
              value: http://judge0-server:2358
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: REDIS_URL
              value: redis://redis:6379/0
          image: backend
          name: aicoach-backend
          ports:
            - containerPort: 8000
              protocol: TCP
          volumeMounts:
            - mountPath: /tmp/adc.json
              name: c
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: c
          persistentVolumeClaim:
            claimName: c
            readOnly: true
