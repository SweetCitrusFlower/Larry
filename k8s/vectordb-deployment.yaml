apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Program Files\Git\usr\bin\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: vectordb
  name: vectordb
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vectordb
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Program Files\Git\usr\bin\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: vectordb
    spec:
      containers:
        - image: chromadb/chroma:latest
          name: aicoach-chromadb
          ports:
            - containerPort: 8000
              protocol: TCP
          volumeMounts:
            - mountPath: /chroma/chroma
              name: chromadata
      restartPolicy: Always
      volumes:
        - name: chromadata
          persistentVolumeClaim:
            claimName: chromadata
